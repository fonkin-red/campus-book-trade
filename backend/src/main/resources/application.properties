spring.application.name=book-trading-backend

# ===== 数据库配置 =====
spring.datasource.url=jdbc:mysql://localhost:3306/book_trading_platform?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== MyBatis 配置 =====
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.booktrading.book_trading_backend.entity
mybatis.configuration.map-underscore-to-camel-case=true

# ===== 日志配置（开发阶段方便调试）=====
logging.level.com.booktrading=DEBUG

# 在 application.properties 中添加，禁用 Security 默认拦截
spring.security.enabled=false

server.port=8081